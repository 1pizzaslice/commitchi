name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# This creates a GitHub Release for the tag, builds static Linux binaries, and
# attaches them (plus SHA-256 sums). The install.sh script downloads these.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # The upload step below attaches assets to an existing Release, so create it
  # first (idempotent, so re-runs are safe).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
                 --title "${GITHUB_REF_NAME}" --generate-notes --verify-tag

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Builds the `commitchi` binary for the target (using cross for non-native
      # targets), creates commitchi-<target>.tar.gz with a SHA-256 sum, and
      # uploads everything to the GitHub Release for the pushed tag.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: commitchi
          target: ${{ matrix.target }}
          archive: commitchi-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
